            {q: "Kim Falastinga nisbatan qat’iy yo’nalish tarafdori bo’lgan?", a: "Binyamin Netanyaxu"}
        ];

        let currentIndex = 0;

        function updateCard() {
            document.getElementById('card').classList.remove('flipped');
            setTimeout(() => {
                document.getElementById('question').innerText = data[currentIndex].q;
                document.getElementById('answer').innerText = data[currentIndex].a;
                document.getElementById('counter').innerText = `Savol: ${currentIndex + 1} / ${data.length}`;
            }, 150);
        }

        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        function next() {
            if (currentIndex < data.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prev() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function jumpTo() {
            const num = document.getElementById('qNum').value;
            if (num > 0 && num <= data.length) {
                currentIndex = num - 1;
                updateCard();
            }
        }

        updateCard();
    </script>
</body>
</html>
